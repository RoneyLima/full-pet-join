services:
  web:
    build: .
    container_name: fullpet-web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: loja-full-pet
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.6
    container_name: fullpet-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: loja-full-pet
    volumes:
      - db_data:/var/lib/mysql
      - ./full-pet-bd.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
